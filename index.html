<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Multi-Dashboard</title>
    <style>
        /* (樣式部分保持不變，僅列出關鍵修改) */
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000000; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", sans-serif; }
        #app-container { width: 1920px; height: 1080px; position: absolute; top: 50%; left: 50%; transform-origin: center center; background-color: #0A2E8E; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none; }
        .page.active { opacity: 1; pointer-events: auto; }
        .dog-grid { width: 1300px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: #1c3c9e; border-right: 4px solid #1c3c9e; padding: 4px; box-sizing: border-box; }
        .dog-slot { position: relative; background: #000; overflow: hidden; }
        .dog-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 1s ease; }
        /* 其他樣式保持原樣... */
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Page 1 & Page 2 結構保持不變 -->
        <div id="page1" class="page active">
            <!-- ... header, middle-row, forecast-row ... -->
            <div class="middle-row">
                <div class="dog-grid" id="dog-grid"></div>
                <!-- weather-current ... -->
            </div>
            <!-- forecast-row -->
        </div>

        <div id="page2" class="page">
            <!-- header -->
            <div class="bus-grid">
                <div class="bus-col" id="bus-col-1"></div>
                <div class="bus-col" id="bus-col-2"></div>
                <!-- traffic-col -->
            </div>
        </div>
    </div>

    <script>
        /* A. 畫布縮放、B. 頁面切換、C. 時鐘 (保持不變) */
        function resizeCanvas() {
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            document.getElementById('app-container').style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        setInterval(() => {
            document.getElementById('page1').classList.toggle('active');
            document.getElementById('page2').classList.toggle('active');
        }, 15000);

        /* 時鐘與日期 (不變) */
        function updateClock() { /* ... 原有程式碼 ... */ }
        setInterval(updateClock, 1000);
        updateClock();

        /* ==========================================
           D. 狗狗相片輪播 - 修正版（保證永遠填滿4格）
           ========================================== */
        const dogUrls = [ /* 原陣列不變 */ 
            "https://images.dog.ceo/breeds/retriever-golden/n02099601_3004.jpg",
            "https://images.dog.ceo/breeds/husky/n02110185_10047.jpg",
            // ... 其餘保持
        ];

        const dogGrid = document.getElementById('dog-grid');
        
        // 初始填滿4格
        function initDogs() {
            dogGrid.innerHTML = '';
            const shuffled = [...dogUrls].sort(() => 0.5 - Math.random());
            for (let i = 0; i < 4; i++) {
                const slot = document.createElement('div');
                slot.className = 'dog-slot';
                slot.innerHTML = `<img id="dog-img-\( {i}" class="dog-img" src=" \){shuffled[i]}" style="opacity:1;">`;
                dogGrid.appendChild(slot);
            }
        }
        initDogs();

        // 每5秒隨機替換一張（保證不留空）
        setInterval(() => {
            const slotIndex = Math.floor(Math.random() * 4);
            const imgEl = document.getElementById(`dog-img-${slotIndex}`);
            if (!imgEl) return;

            imgEl.style.opacity = 0;

            setTimeout(() => {
                let newUrl = dogUrls[Math.floor(Math.random() * dogUrls.length)];
                const currentUrls = Array.from(document.querySelectorAll('.dog-img')).map(img => img.src);
                
                // 避免重複
                while (currentUrls.includes(newUrl)) {
                    newUrl = dogUrls[Math.floor(Math.random() * dogUrls.length)];
                }

                imgEl.src = newUrl;
                imgEl.onload = () => { imgEl.style.opacity = 1; };
                // 防止載入失敗
                imgEl.onerror = () => { imgEl.src = dogUrls[0]; imgEl.style.opacity = 1; };
            }, 800);
        }, 5000);

        /* ==========================================
           E. 巴士 ETA - 重大修正（正確 API URL + 過濾方向）
           ========================================== */
        const busRoutes = [ /* 原陣列保持不變 */ ];

        // 渲染框架 (不變)
        const col1 = document.getElementById('bus-col-1');
        const col2 = document.getElementById('bus-col-2');
        busRoutes.forEach((r, idx) => {
            const html = `...`; // 原有 HTML 模板不變
            if (idx < 4) col1.innerHTML += html;
            else col2.innerHTML += html;
        });

        // 修正後的核心抓取函數
        async function fetchSpecificRoute(idx) {
            const r = busRoutes[idx];
            const activeDir = r.dirs[r.currentDir];
            const now = new Date();

            try {
                // 正確的 API URL：只用 route + service_type=1
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${r.num}/1`);
                const json = await res.json();
                
                let displayTimes = [];

                if (json.data && json.data.length > 0) {
                    const seqGroups = {};

                    json.data.forEach(item => {
                        // 關鍵修正：只取目前方向的資料
                        if (item.dir !== activeDir.d || !item.eta) return;

                        const etaDate = new Date(item.eta);
                        if (etaDate >= now) {
                            if (!seqGroups[item.seq]) seqGroups[item.seq] = [];
                            const hh = String(etaDate.getHours()).padStart(2, '0');
                            const mm = String(etaDate.getMinutes()).padStart(2, '0');
                            seqGroups[item.seq].push(`\( {hh}: \){mm}`);
                        }
                    });

                    // 找資料最豐富的站台
                    let bestSeq = null;
                    let maxCount = 0;
                    for (const seq in seqGroups) {
                        seqGroups[seq] = [...new Set(seqGroups[seq])].sort();
                        if (seqGroups[seq].length > maxCount) {
                            maxCount = seqGroups[seq].length;
                            bestSeq = seq;
                        }
                    }

                    if (bestSeq) {
                        displayTimes = seqGroups[bestSeq].slice(0, 3);
                    }
                }

                const container = document.getElementById(`bus-etas-${idx}`);
                if (displayTimes.length === 0) {
                    container.innerHTML = `<span class="eta-time none">暫無班次</span>`;
                } else {
                    container.innerHTML = displayTimes.map(t => `<span class="eta-time">${t}</span>`).join('');
                }
            } catch (e) {
                console.error(`Bus API Error (${r.num}):`, e);
                document.getElementById(`bus-etas-${idx}`).innerHTML = `<span class="eta-time none">載入失敗</span>`;
            }
        }

        function toggleDirection(idx) { /* 原有 toggle 邏輯不變 */ }

        function fetchAllBuses() {
            for (let i = 0; i < busRoutes.length; i++) {
                fetchSpecificRoute(i);
            }
        }

        fetchAllBuses();
        setInterval(fetchAllBuses, 60000);

        /* F. 天氣部分保持不變 */
        /* ... 原有 fetchWeather ... */
    </script>
</body>
</html>
