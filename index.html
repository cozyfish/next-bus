<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Multi-Dashboard</title>
    <style>
        /* ==========================================
           1. 完美自適應畫布系統
           ========================================== */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", sans-serif;
            position: relative;
        }

        #app-container {
            width: 1920px; height: 1080px;
            position: absolute;
            left: 0; top: 0;
            transform-origin: 0 0; 
            background-color: #0A2E8E;
            overflow: hidden;
        }

        .page {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            opacity: 0; transition: opacity 1s ease-in-out;
            pointer-events: none;
        }
        .page.active { opacity: 1; pointer-events: auto; }

        /* ==========================================
           2. 頂部 Header
           ========================================== */
        .header {
            height: 160px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 4px solid #1c3c9e; background-color: #0A2E8E;
        }
        .header-left { display: flex; flex-direction: column; justify-content: center; }
        .date-str { font-size: 65px; color: #88ccff; font-weight: bold; letter-spacing: 2px; line-height: 1.1; }
        .lunar-str { font-size: 32px; color: #88ccff; margin-top: 5px; font-weight: bold; }
        .time-str { font-size: 130px; color: #88ccff; letter-spacing: 5px; margin-top: -10px; }

        /* ==========================================
           3. 頁面 1 (天氣與雙層 4 格狗相)
           ========================================== */
        .middle-row { height: 490px; display: flex; border-bottom: 4px solid #1c3c9e; }
        
        .dog-carousel-container {
            width: 1300px; position: relative; background: #1c3c9e;
            border-right: 4px solid #1c3c9e; box-sizing: border-box; overflow: hidden;
        }
        
        .dog-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 4px;
            box-sizing: border-box; transition: opacity 0.8s ease-in-out; 
        }
        .dog-slot { background: #0A2E8E; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .dog-img { width: 100%; height: 100%; object-fit: cover; }

        .weather-current { 
            width: 620px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; box-sizing: border-box; 
        }
        .weather-loc { font-size: 65px; color: #88ccff; margin-bottom: 15px; }
        .weather-temp { font-size: 60px; color: #fff; margin-bottom: 20px; font-weight: bold; }
        .weather-aqi { font-size: 40px; color: #aaa; line-height: 1.5; margin-bottom: 15px; }
        .weather-icon-huge { font-size: 120px; margin-top: 10px; }

        .forecast-row { 
            height: 430px; display: grid; grid-template-columns: repeat(6, 1fr); 
            gap: 4px; background: #1c3c9e; padding: 4px 0 0 0; 
        }
        .forecast-day { background: #0A2E8E; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .fd-date { font-size: 38px; font-weight: bold; color: #88ccff; }
        .fd-day { font-size: 34px; font-weight: bold; color: #88ccff; }
        .fd-day.sun { color: #ff5555; }
        .fd-icon { font-size: 70px; }
        .fd-temp { font-size: 42px; font-weight: bold; color: #fff; }
        .fd-hum { font-size: 32px; color: #88ccff; }
        .fd-rain { font-size: 30px; color: #88ccff; }

        /* ==========================================
           4. 頁面 2 (巴士與交通)
           ========================================== */
        .bus-grid { 
            height: 920px; display: grid; grid-template-columns: 660px 660px 584px; 
            gap: 8px; background: #1c3c9e; padding: 8px; box-sizing: border-box; 
        }
        .bus-col { display: grid; grid-template-rows: repeat(4, 1fr); gap: 8px; }
        .bus-cell { background: #0A2E8E; display: flex; flex-direction: column; justify-content: center; padding: 0 40px; }
        
        .bus-route-row { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid rgba(255,255,255,0.15); padding-bottom: 10px; }
        .bus-num { font-size: 65px; color: #ffffaa; font-weight: bold; white-space: nowrap; }
        .bus-dest-container { display: flex; align-items: center; justify-content: flex-end; width: 100%; margin-left: 20px;}
        .bus-dest { font-size: 40px; color: #ffffff; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
        
        .refresh-btn { 
            cursor: pointer; margin-left: 15px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease; user-select: none;
        }
        .refresh-btn:active svg { transform: rotate(180deg); }

        .bus-eta-row { display: flex; gap: 30px; margin-top: 25px; font-weight: bold; font-size: 60px; }
        .eta-time { color: #55ff55; } 
        .eta-time.none { color: #888; font-size: 42px; font-weight: normal; }

        .traffic-col { background: #002277; padding: 40px; display: flex; flex-direction: column; justify-content: center; gap: 40px; }
        .traffic-header { font-size: 45px; color: #88ccff; border-bottom: 2px solid #88ccff; padding-bottom: 15px; margin-bottom: 10px; text-align: center; }
        .traffic-row { display: flex; justify-content: space-between; font-size: 50px; color: #fff; align-items: center; }
        .traffic-time { color: #55ff55; font-weight: bold; }
        .traffic-time span { font-size: 35px; color: #aaa; margin-left: 10px; font-weight: normal; }

    </style>
</head>
<body>

    <div id="app-container">
        <div id="page1" class="page active">
            <div class="header">
                <div class="header-left">
                    <div class="date-str" id="date-str-1">----年--月--日(-)</div>
                    <div class="lunar-str" id="lunar-str-1">載入農曆中...</div>
                </div>
                <div class="header-right"><div class="time-str" id="time-str-1">--:--:--</div></div>
            </div>
            <div class="middle-row">
                <div class="dog-carousel-container">
                    <div class="dog-layer" id="dog-layer-1" style="opacity: 1; z-index: 2;">
                        <div class="dog-slot"><img id="l1-img-0" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l1-img-1" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l1-img-2" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l1-img-3" class="dog-img" src=""></div>
                    </div>
                    <div class="dog-layer" id="dog-layer-2" style="opacity: 0; z-index: 1;">
                        <div class="dog-slot"><img id="l2-img-0" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l2-img-1" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l2-img-2" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l2-img-3" class="dog-img" src=""></div>
                    </div>
                </div>
                <div class="weather-current">
                    <div class="weather-loc">沙田</div>
                    <div class="weather-temp" id="cw-temp-hum">--°C | --%</div>
                    <div class="weather-aqi">CO2: 448<br>PM2.5: 26</div> 
                    <div class="weather-icon-huge" id="cw-icon">⛅</div>
                </div>
            </div>
            <div class="forecast-row" id="forecast-row"></div>
        </div>

        <div id="page2" class="page">
            <div class="header">
                <div class="header-left">
                    <div class="date-str" id="date-str-2">----年--月--日(-)</div>
                    <div class="lunar-str" id="lunar-str-2">載入農曆中...</div>
                </div>
                <div class="header-right"><div class="time-str" id="time-str-2">--:--:--</div></div>
            </div>
            <div class="bus-grid">
                <div class="bus-col" id="bus-col-1"></div>
                <div class="bus-col" id="bus-col-2"></div>
                <div class="traffic-col">
                    <div class="traffic-header">沙田區 隧道預計時間</div>
                    <div class="traffic-row"><span>獅子山隧道</span><span class="traffic-time" id="tunnel-lion">--<span>分鐘</span></span></div>
                    <div class="traffic-row"><span>大老山隧道</span><span class="traffic-time" id="tunnel-tates">--<span>分鐘</span></span></div>
                    <div class="traffic-row"><span>城門隧道</span><span class="traffic-time" id="tunnel-shingmun">--<span>分鐘</span></span></div>
                    <div class="traffic-row"><span>尖山隧道</span><span class="traffic-time" id="tunnel-eagle">--<span>分鐘</span></span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================
           A. 畫布自適應縮放
           ========================================== */
        function resizeCanvas() {
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const scale = Math.min(ww / 1920, wh / 1080);
            const left = (ww - (1920 * scale)) / 2;
            const top = (wh - (1080 * scale)) / 2;
            document.getElementById('app-container').style.transform = `translate(${left}px, ${top}px) scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        setInterval(() => {
            document.getElementById('page1').classList.toggle('active');
            document.getElementById('page2').classList.toggle('active');
        }, 15000);

        /* ==========================================
           C. 時鐘與完美農曆引擎
           ========================================== */
        function getPerfectLunarDateStr(date) {
            try {
                const formatter = new Intl.DateTimeFormat('zh-HK-u-ca-chinese', { dateStyle: 'full' });
                let rawStr = formatter.format(date); 
                
                let stemBranch = "丙午"; 
                const sbMatch = rawStr.match(/(\w{2})年/);
                if (sbMatch) stemBranch = sbMatch[1];

                const zodiacMap = {'子':'鼠','丑':'牛','寅':'虎','卯':'兔','辰':'龍','巳':'蛇','午':'馬','未':'羊','申':'猴','酉':'雞','戌':'狗','亥':'豬'};
                const zodiac = zodiacMap[stemBranch.charAt(1)] || "馬";

                let monthDayStr = "五月十五";
                const mdMatch = rawStr.match(/年(.+?)日/);
                if (mdMatch) {
                    monthDayStr = mdMatch[1];
                    monthDayStr = monthDayStr
                        .replace('M01', '正月').replace('M02', '二月').replace('M03', '三月').replace('M04', '四月')
                        .replace('M05', '五月').replace('M06', '六月').replace('M07', '七月').replace('M08', '八月')
                        .replace('M09', '九月').replace('M10', '十月').replace('M11', '十一月').replace('M12', '十二月');
                    
                    const dayCh = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                                  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                                  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
                    monthDayStr = monthDayStr.replace(/ (\d{1,2})/, (match, p1) => {
                        return dayCh[parseInt(p1)] || match;
                    });
                }

                return `農曆 ${stemBranch} ${zodiac}年 ${monthDayStr}`;
            } catch(e) {
                return "農曆 丙午 馬年 五月十五"; 
            }
        }

        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            
            document.getElementById('time-str-1').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('time-str-2').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('date-str-1').innerText = `${year}年${month}月${date}日(${weekdays[now.getDay()]})`;
            document.getElementById('date-str-2').innerText = `${year}年${month}月${date}日(${weekdays[now.getDay()]})`;

            const lunarText = getPerfectLunarDateStr(now);
            document.getElementById('lunar-str-1').innerText = lunarText;
            document.getElementById('lunar-str-2').innerText = lunarText;
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ==========================================
           D. 狗狗相片 3 秒極速無縫輪播
           ========================================== */
        const dogUrls = [
            "https://images.dog.ceo/breeds/retriever-golden/n02099601_3004.jpg",
            "https://images.dog.ceo/breeds/husky/n02110185_10047.jpg",
            "https://images.dog.ceo/breeds/shiba/shiba-13.jpg",
            "https://images.dog.ceo/breeds/samoyed/n02111889_110.jpg",
            "https://images.dog.ceo/breeds/corgi-cardigan/n02113186_1111.jpg",
            "https://images.dog.ceo/breeds/pug/n02110958_13038.jpg",
            "https://images.dog.ceo/breeds/beagle/n02088364_12115.jpg",
            "https://images.dog.ceo/breeds/pomeranian/n02112018_1090.jpg",
            "https://images.dog.ceo/breeds/dalmatian/cooper1.jpg",
            "https://images.dog.ceo/breeds/retriever-labrador/n02099712_7411.jpg"
        ];
        
        let activeLayer = 1;

        function get4RandomDogs() {
            let selected = [];
            while(selected.length < 4) {
                let url = dogUrls[Math.floor(Math.random() * dogUrls.length)];
                if(!selected.includes(url)) selected.push(url);
            }
            return selected;
        }

        const initialDogs = get4RandomDogs();
        for(let i=0; i<4; i++) {
            document.getElementById(`l1-img-${i}`).src = initialDogs[i];
        }

        setInterval(() => {
            const nextLayer = activeLayer === 1 ? 2 : 1;
            const newDogs = get4RandomDogs();
            let loadedCount = 0;

            for(let i=0; i<4; i++) {
                const imgEl = document.getElementById(`l${nextLayer}-img-${i}`);
                imgEl.onload = () => {
                    loadedCount++;
                    if(loadedCount === 4) {
                        document.getElementById(`dog-layer-${nextLayer}`).style.opacity = 1;
                        document.getElementById(`dog-layer-${nextLayer}`).style.zIndex = 2;
                        
                        document.getElementById(`dog-layer-${activeLayer}`).style.opacity = 0;
                        document.getElementById(`dog-layer-${activeLayer}`).style.zIndex = 1;
                        
                        activeLayer = nextLayer;
                    }
                };
                imgEl.src = newDogs[i];
            }
        }, 3000); 

        /* ==========================================
           E. 巴士 ETA (九巴 + 城巴 聯營無縫融合)
           ========================================== */
        const ETA_OFFSET_MINUTES = -2; // 維持 -2 分鐘時差補償

        const busRoutes = [
            { num: '47X', currentDir: 0, dirs: [{ dest: '葵盛(東)', dir: 'O', seq: 4 }, { dest: '秦石', dir: 'I', seq: 25 }] },
            { num: '80X', currentDir: 0, dirs: [{ dest: '觀塘碼頭', dir: 'O', seq: 4 }, { dest: '秦石', dir: 'I', seq: 16 }] },
            { num: '287X', currentDir: 0, dirs: [{ dest: '旺角(循環)', dir: 'O', seq: 5 }, { dest: '水泉澳', dir: 'I', seq: 18 }] },
            
            // 170 聯營路線加入城巴 ctbStopId
            // 若發現城巴時段數據不準，可在 https://rt.data.gov.hk 搜尋正確的 Citybus Stop ID 替換
            { num: '170', currentDir: 0, dirs: [
                { dest: '華富(中)', dir: 'O', seq: 3, ctbStopId: '002626' }, // 博康邨, 沙角街 (城巴)
                { dest: '沙田站', dir: 'I', seq: 32, ctbStopId: '002657' }   // 沙角邨, 沙角街 (城巴)
            ]},
            
            { num: '81C', currentDir: 0, dirs: [{ dest: '尖沙咀(東)', dir: 'O', seq: 10}, { dest: '耀安', dir: 'I', seq: 28}] },
            { num: '89X', currentDir: 0, dirs: [{ dest: '觀塘站', dir: 'O', seq: 7}, { dest: '沙田站', dir: 'I', seq: 22}] },
            { num: '282', currentDir: 0, dirs: [{ dest: '新城市廣場', dir: 'O', seq: 3}, { dest: '沙田市中心', dir: 'I', seq: 12}] },
            { num: '284', currentDir: 0, dirs: [{ dest: '沙田市中心', dir: 'O', seq: 4}, { dest: '濱景花園', dir: 'I', seq: 10}] }
        ];

        const refreshSvgIcon = `
            <svg viewBox="0 0 24 24" width="38" height="38" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        `;

        const col1 = document.getElementById('bus-col-1');
        const col2 = document.getElementById('bus-col-2');
        busRoutes.forEach((r, idx) => {
            const html = `
                <div class="bus-cell">
                    <div class="bus-route-row">
                        <span class="bus-num">${r.num}</span>
                        <div class="bus-dest-container">
                            <span class="bus-dest" id="bus-dest-text-${idx}">${r.dirs[r.currentDir].dest}</span>
                            <div class="refresh-btn" onclick="toggleDirection(${idx})" title="切換方向">${refreshSvgIcon}</div>
                        </div>
                    </div>
                    <div class="bus-eta-row" id="bus-etas-${idx}"><span class="eta-time none">載入中...</span></div>
                </div>`;
            if (idx < 4) col1.innerHTML += html;
            else col2.innerHTML += html;
        });

        async function fetchSpecificRoute(idx) {
            const r = busRoutes[idx];
            const activeDir = r.dirs[r.currentDir];
            const now = new Date();
            let rawDates = []; // 儲存包含九巴及城巴的所有未處理時間對象

            try {
                // 1. 抓取九巴 (KMB) 數據
                const kmbRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${r.num}/1`);
                const kmbJson = await kmbRes.json();
                
                if (kmbJson.data && kmbJson.data.length > 0) {
                    const validKmbEtas = kmbJson.data.filter(item => 
                        item.dir === activeDir.dir && item.seq === activeDir.seq && item.eta !== null
                    );
                    validKmbEtas.forEach(item => {
                        const originalTimeMs = new Date(item.eta).getTime();
                        const adjustedEtaDate = new Date(originalTimeMs + (ETA_OFFSET_MINUTES * 60000));
                        if (adjustedEtaDate >= new Date(now.getTime() - 60000)) rawDates.push(adjustedEtaDate);
                    });
                }

                // 2. 抓取城巴 (CTB) 數據 (如果有設定 ctbStopId)
                if (activeDir.ctbStopId) {
                    try {
                        const ctbRes = await fetch(`https://rt.data.gov.hk/v1.1/transport/citybus-nwfb/eta/CTB/${activeDir.ctbStopId}/${r.num}`);
                        const ctbJson = await ctbRes.json();
                        
                        if (ctbJson.data && ctbJson.data.length > 0) {
                            // 城巴的 API 通常也會在 dir 欄位返回 'O' 或 'I'
                            const validCtbEtas = ctbJson.data.filter(item => 
                                item.dir === activeDir.dir && item.eta !== null && item.eta !== ""
                            );
                            validCtbEtas.forEach(item => {
                                const originalTimeMs = new Date(item.eta).getTime();
                                const adjustedEtaDate = new Date(originalTimeMs + (ETA_OFFSET_MINUTES * 60000));
                                if (adjustedEtaDate >= new Date(now.getTime() - 60000)) rawDates.push(adjustedEtaDate);
                            });
                        }
                    } catch (ctbErr) {
                        console.error(`CTB API Error (${r.num}):`, ctbErr);
                    }
                }

                // 3. 合併排序、去重及格式化
                rawDates.sort((a, b) => a.getTime() - b.getTime()); // 按時間先後排序
                
                let formattedTimes = rawDates.map(date => {
                    const hh = String(date.getHours()).padStart(2, '0');
                    const mm = String(date.getMinutes()).padStart(2, '0');
                    return `${hh}:${mm}`;
                });
                
                // 去除可能重複的時間並只取前 3 班
                formattedTimes = [...new Set(formattedTimes)].slice(0, 3);

                // 4. 渲染至畫面
                const container = document.getElementById(`bus-etas-${idx}`);
                if (formattedTimes.length === 0) {
                    container.innerHTML = `<span class="eta-time none">暫無班次 / 過鐘</span>`;
                } else {
                    container.innerHTML = formattedTimes.map(t => `<span class="eta-time">${t}</span>`).join('');
                }
            } catch (e) { 
                console.error(`Bus Merge API Error (${r.num}):`, e); 
                document.getElementById(`bus-etas-${idx}`).innerHTML = `<span class="eta-time none">載入失敗</span>`;
            }
        }

        function toggleDirection(idx) {
            const r = busRoutes[idx];
            r.currentDir = (r.currentDir + 1) % r.dirs.length;
            document.getElementById(`bus-dest-text-${idx}`).innerText = r.dirs[r.currentDir].dest;
            document.getElementById(`bus-etas-${idx}`).innerHTML = '<span class="eta-time none">載入中...</span>';
            fetchSpecificRoute(idx);
        }

        async function fetchAllBuses() {
            for (let i = 0; i < busRoutes.length; i++) {
                await fetchSpecificRoute(i);
                await new Promise(resolve => setTimeout(resolve, 300));
            }
        }
        
        fetchAllBuses();
        setInterval(fetchAllBuses, 60000);

        /* ==========================================
           F. 香港天文台實時及預報天氣
           ========================================== */
        function getWeatherIcon(iconId) {
            if(iconId >= 50 && iconId <= 54) return '☀️';
            if(iconId >= 60 && iconId <= 65) return '☁️';
            if(iconId >= 70 && iconId <= 77) return '🌧️';
            if(iconId >= 80) return '⛈️';
            return '⛅';
        }

        async function fetchWeather() {
            try {
                const curRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const curData = await curRes.json();
                const temp = curData.temperature.data.find(d => d.place === '沙田')?.value || curData.temperature.data[0].value;
                const hum = curData.humidity.data[0].value;
                document.getElementById('cw-temp-hum').innerText = `${temp}°C | ${hum}%`;
                
                const fndRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndData = await fndRes.json();
                const forecastRow = document.getElementById('forecast-row');
                forecastRow.innerHTML = '';
                
                fndData.weatherForecast.slice(0, 6).forEach(day => {
                    const dateStr = `${day.forecastDate.substring(4,6)}月${day.forecastDate.substring(6,8)}日`;
                    const isSun = day.week === '星期日';
                    const tempStr = `${day.forecastMintemp.value}|${day.forecastMaxtemp.value}°C`;
                    const humStr = `${day.forecastMinrh.value}-${day.forecastMaxrh.value}%`;
                    const rainStr = `降雨: ${day.PSR}`;
                    
                    forecastRow.innerHTML += `
                        <div class="forecast-day">
                            <div class="fd-date">${dateStr}</div>
                            <div class="fd-day ${isSun ? 'sun' : ''}">${day.week}</div>
                            <div class="fd-icon">${getWeatherIcon(day.ForecastIcon)}</div>
                            <div class="fd-temp">${tempStr}</div>
                            <div class="fd-hum">${humStr}</div>
                            <div class="fd-rain">${rainStr}</div>
                        </div>`;
                });
            } catch (e) { console.error("Weather API Error:", e); }
        }
        setInterval(fetchWeather, 5 * 60 * 1000);
        fetchWeather();

        /* ==========================================
           G. 隧道預計時間 (TDAS API)
           ========================================== */
        async function fetchTunnelTime(startLat, startLng, endLat, endLng, elementId) {
            try {
                const response = await fetch('https://tdas-api.hkemobility.gov.hk/tdas/api/route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        start: { lat: startLat, long: startLng },
                        end: { lat: endLat, long: endLng },
                        departIn: 0, lang: "tc", type: "ST"
                    })
                });
                const data = await response.json();
                if (data && data.eta) {
                    const parts = data.eta.split(':');
                    const mins = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
                    document.getElementById(elementId).innerHTML = `${mins}<span>分鐘</span>`;
                }
            } catch (e) {
                document.getElementById(elementId).innerHTML = `--<span>分鐘</span>`;
            }
        }

        async function fetchAllTunnels() {
            await fetchTunnelTime(22.3687, 114.1866, 22.3396, 114.1764, 'tunnel-lion');
            await new Promise(r => setTimeout(r, 300));
            await fetchTunnelTime(22.3820, 114.2045, 22.3364, 114.2057, 'tunnel-tates');
            await new Promise(r => setTimeout(r, 300));
            await fetchTunnelTime(22.3807, 114.1751, 22.3784, 114.1311, 'tunnel-shingmun');
            await new Promise(r => setTimeout(r, 300));
            await fetchTunnelTime(22.3698, 114.1670, 22.3360, 114.1481, 'tunnel-eagle');
        }

        fetchAllTunnels();
        setInterval(fetchAllTunnels, 3 * 60 * 1000); 
    </script>
