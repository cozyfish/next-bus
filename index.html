<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Multi-Dashboard</title>
    <style>
        /* ==========================================
           1. 完美自適應畫布系統 (Canvas Scaling System)
           ========================================== */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", sans-serif;
        }

        #app-container {
            /* 固定虛擬解像度 1920x1080，由 JS 負責等比例縮放 */
            width: 1920px; height: 1080px;
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center center;
            background-color: #0A2E8E;
            overflow: hidden;
        }

        /* 頁面切換動畫 */
        .page {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            opacity: 0; transition: opacity 1s ease-in-out;
            pointer-events: none;
        }
        .page.active { opacity: 1; pointer-events: auto; }

        /* ==========================================
           2. 頂部 Header (共用)
           ========================================== */
        .header {
            height: 160px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 4px solid #1c3c9e; background-color: #0A2E8E;
        }
        .header-left { display: flex; flex-direction: column; }
        .date-str { font-size: 70px; color: #88ccff; font-weight: bold; letter-spacing: 2px; }
        .lunar-str { font-size: 28px; color: #88ccff; margin-top: 5px; }
        .time-str { font-size: 130px; color: #88ccff; letter-spacing: 5px; margin-top: -15px; }

        /* ==========================================
           3. 頁面 1 (天氣與狗狗相片)
           ========================================== */
        .middle-row { height: 490px; display: flex; border-bottom: 4px solid #1c3c9e; }
        
        /* 狗狗 4 宮格 */
        .dog-grid { 
            width: 1300px; display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 4px; background: #1c3c9e; border-right: 4px solid #1c3c9e; padding: 4px; box-sizing: border-box; 
        }
        .dog-slot { position: relative; background: #000; overflow: hidden; }
        .dog-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 1s ease; opacity: 1; }

        /* 右側天氣資訊 */
        .weather-current { 
            width: 620px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; box-sizing: border-box; 
        }
        .weather-loc { font-size: 65px; color: #88ccff; margin-bottom: 15px; }
        .weather-temp { font-size: 60px; color: #fff; margin-bottom: 20px; font-weight: bold; }
        .weather-aqi { font-size: 40px; color: #aaa; line-height: 1.5; margin-bottom: 15px; }
        .weather-icon-huge { font-size: 120px; margin-top: 10px; }

        /* 底部 6 天預報 */
        .forecast-row { 
            height: 430px; display: grid; grid-template-columns: repeat(6, 1fr); 
            gap: 4px; background: #1c3c9e; padding: 4px 0 0 0; 
        }
        .forecast-day { background: #0A2E8E; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .fd-date { font-size: 38px; font-weight: bold; color: #88ccff; }
        .fd-day { font-size: 34px; font-weight: bold; color: #88ccff; }
        .fd-day.sun { color: #ff5555; }
        .fd-icon { font-size: 70px; }
        .fd-temp { font-size: 42px; font-weight: bold; color: #fff; }
        .fd-hum { font-size: 32px; color: #88ccff; }
        .fd-rain { font-size: 30px; color: #88ccff; }

        /* ==========================================
           4. 頁面 2 (巴士與交通)
           ========================================== */
        .bus-grid { 
            height: 920px; display: grid; grid-template-columns: 660px 660px 584px; 
            gap: 8px; background: #1c3c9e; padding: 8px; box-sizing: border-box; 
        }
        .bus-col { display: grid; grid-template-rows: repeat(4, 1fr); gap: 8px; }
        .bus-cell { background: #0A2E8E; display: flex; flex-direction: column; justify-content: center; padding: 0 40px; }
        .bus-route-row { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid rgba(255,255,255,0.15); padding-bottom: 10px; }
        .bus-num { font-size: 65px; color: #ffffaa; font-weight: bold; }
        .bus-dest { font-size: 45px; color: #ffffff; }
        .bus-eta-row { display: flex; gap: 50px; margin-top: 25px; font-weight: bold; font-size: 75px; }
        .eta-min { color: #55ff55; } /* 綠色 > 5分鐘 */
        .eta-min.red { color: #ff5555; } /* 紅色 <= 5分鐘 */
        .eta-min.none { color: #888; font-size: 50px; }

        /* 隧道交通資訊 */
        .traffic-col { background: #002277; padding: 40px; display: flex; flex-direction: column; justify-content: center; gap: 40px; }
        .traffic-header { font-size: 45px; color: #88ccff; border-bottom: 2px solid #88ccff; padding-bottom: 15px; margin-bottom: 10px; text-align: center; }
        .traffic-row { display: flex; justify-content: space-between; font-size: 50px; color: #fff; align-items: center; }
        .traffic-time { color: #55ff55; font-weight: bold; }
        .traffic-time span { font-size: 35px; color: #aaa; margin-left: 10px; font-weight: normal; }

    </style>
</head>
<body>

    <div id="app-container">
        <div id="page1" class="page active">
            <div class="header">
                <div class="header-left">
                    <span class="date-str" id="date-str-1">----年--月--日(-)</span>
                    <div class="lunar-str">二零二六年五月十三 丙午年 (馬年)</div>
                </div>
                <div class="header-right"><span class="time-str" id="time-str-1">--:--:--</span></div>
            </div>
            <div class="middle-row">
                <div class="dog-grid" id="dog-grid">
                    </div>
                <div class="weather-current">
                    <div class="weather-loc">沙田</div>
                    <div class="weather-temp" id="cw-temp-hum">--°C | --%</div>
                    <div class="weather-aqi">CO2: 448<br>PM2.5: 26</div> <div class="weather-icon-huge" id="cw-icon">⛅</div>
                </div>
            </div>
            <div class="forecast-row" id="forecast-row">
                </div>
        </div>

        <div id="page2" class="page">
            <div class="header">
                <div class="header-left">
                    <span class="date-str" id="date-str-2">----年--月--日(-)</span>
                    <div class="lunar-str">二零二六年五月十三 丙午年 (馬年)</div>
                </div>
                <div class="header-right"><span class="time-str" id="time-str-2">--:--:--</span></div>
            </div>
            <div class="bus-grid">
                <div class="bus-col" id="bus-col-1"></div>
                <div class="bus-col" id="bus-col-2"></div>
                <div class="traffic-col">
                    <div class="traffic-header">沙田區 隧道預計時間</div>
                    <div class="traffic-row"><span>獅子山隧道</span><span class="traffic-time">12<span>分鐘</span></span></div>
                    <div class="traffic-row"><span>大老山隧道</span><span class="traffic-time">15<span>分鐘</span></span></div>
                    <div class="traffic-row"><span>城門隧道</span><span class="traffic-time">10<span>分鐘</span></span></div>
                    <div class="traffic-row"><span>尖山隧道</span><span class="traffic-time">08<span>分鐘</span></span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================
           A. 畫布自適應縮放 (保證全螢幕不變形)
           ========================================== */
        function resizeCanvas() {
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const scale = Math.min(ww / 1920, wh / 1080);
            const container = document.getElementById('app-container');
            container.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        /* ==========================================
           B. 頁面自動切換 (每 15 秒)
           ========================================== */
        setInterval(() => {
            document.getElementById('page1').classList.toggle('active');
            document.getElementById('page2').classList.toggle('active');
        }, 15000);

        /* ==========================================
           C. 時鐘與日期 (每秒更新)
           ========================================== */
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${hh}:${mm}:${ss}`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const dateStr = `${year}年${month}月${date}日(${weekdays[now.getDay()]})`;

            document.getElementById('time-str-1').innerText = timeStr;
            document.getElementById('time-str-2').innerText = timeStr;
            document.getElementById('date-str-1').innerText = dateStr;
            document.getElementById('date-str-2').innerText = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ==========================================
           D. 狗狗 4宮格輪播 (大幅擴充 20 張相片)
           ========================================== */
        const dogUrls = [
            "https://images.dog.ceo/breeds/retriever-golden/n02099601_3004.jpg",
            "https://images.dog.ceo/breeds/husky/n02110185_10047.jpg",
            "https://images.dog.ceo/breeds/shiba/shiba-13.jpg",
            "https://images.dog.ceo/breeds/samoyed/n02111889_110.jpg",
            "https://images.dog.ceo/breeds/corgi-cardigan/n02113186_1111.jpg",
            "https://images.dog.ceo/breeds/pug/n02110958_13038.jpg",
            "https://images.dog.ceo/breeds/beagle/n02088364_12115.jpg",
            "https://images.dog.ceo/breeds/bulldog-french/n02108915_4664.jpg",
            "https://images.dog.ceo/breeds/pomeranian/n02112018_1090.jpg",
            "https://images.dog.ceo/breeds/malamute/n02110063_14238.jpg",
            "https://images.dog.ceo/breeds/chihuahua/n02085620_2650.jpg",
            "https://images.dog.ceo/breeds/dalmatian/cooper1.jpg",
            "https://images.dog.ceo/breeds/akita/Akita_Inu_dog.jpg",
            "https://images.dog.ceo/breeds/retriever-labrador/n02099712_7411.jpg",
            "https://images.dog.ceo/breeds/dachshund/dog-3061494_640.jpg",
            "https://images.dog.ceo/breeds/poodle-standard/n02113799_2280.jpg",
            "https://images.dog.ceo/breeds/schnauzer-miniature/n02097047_6784.jpg",
            "https://images.dog.ceo/breeds/chow/n02112261_3726.jpg",
            "https://images.dog.ceo/breeds/mastiff-tibetan/n02108551_1189.jpg",
            "https://images.dog.ceo/breeds/rottweiler/n02106550_10606.jpg"
        ];
        
        // 初始化 HTML
        const dogGrid = document.getElementById('dog-grid');
        for(let i=0; i<4; i++) {
            dogGrid.innerHTML += `<div class="dog-slot"><img id="dog-img-${i}" class="dog-img" src="${dogUrls[i]}"></div>`;
        }

        setInterval(() => {
            const slotIndex = Math.floor(Math.random() * 4); // 隨機挑選 0-3 其中一格
            const imgEl = document.getElementById(`dog-img-${slotIndex}`);
            
            imgEl.style.opacity = 0; // 淡出
            setTimeout(() => {
                const currentUrls = [0,1,2,3].map(i => document.getElementById(`dog-img-${i}`).src);
                let newUrl = dogUrls[Math.floor(Math.random() * dogUrls.length)];
                while(currentUrls.includes(newUrl)) { // 確保不與當前畫面重複
                    newUrl = dogUrls[Math.floor(Math.random() * dogUrls.length)];
                }
                imgEl.src = newUrl;
                imgEl.onload = () => { imgEl.style.opacity = 1; }; // 載入完畢後淡入
            }, 1000);
        }, 5000);

        /* ==========================================
           E. 巴士 ETA (智能搜尋最多班次的車站，解決「載入中」問題)
           ========================================== */
        const busRoutes = [
            { num: '47X', dest: '葵盛(東)', dir: 'O' }, { num: '80X', dest: '觀塘碼頭', dir: 'O' },
            { num: '287X', dest: '水泉澳', dir: 'O' }, { num: '81C', dest: '尖沙咀(東)', dir: 'O' },
            { num: '89X', dest: '觀塘站', dir: 'O' },  { num: '170', dest: '華富(中)', dir: 'O' },
            { num: '282', dest: '新城市廣場', dir: 'O'}, { num: '284', dest: '沙田市中心', dir: 'O' }
        ];

        const col1 = document.getElementById('bus-col-1');
        const col2 = document.getElementById('bus-col-2');
        busRoutes.forEach((r, idx) => {
            const html = `
                <div class="bus-cell">
                    <div class="bus-route-row"><span class="bus-num">${r.num}</span><span class="bus-dest">${r.dest}</span></div>
                    <div class="bus-eta-row" id="bus-etas-${idx}"><span class="eta-min none">載入中...</span></div>
                </div>`;
            if (idx < 4) col1.innerHTML += html;
            else col2.innerHTML += html;
        });

        async function fetchBusETA() {
            const now = new Date();
            for (let i = 0; i < busRoutes.length; i++) {
                try {
                    const r = busRoutes[i];
                    // 抓取整條路線的 ETA
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${r.num}/1/${r.dir}`);
                    const json = await res.json();
                    
                    let displayMins = [];
                    
                    if (json.data && json.data.length > 0) {
                        const seqGroups = {}; // 用於按站點順序 (seq) 分組
                        
                        // 整理所有有效的將來到站時間
                        json.data.forEach(item => {
                            if (item.eta) {
                                const diffMins = Math.floor((new Date(item.eta) - now) / 60000);
                                if (diffMins >= 0) {
                                    if (!seqGroups[item.seq]) seqGroups[item.seq] = [];
                                    seqGroups[item.seq].push(diffMins);
                                }
                            }
                        });

                        // 智能挑選：找出包含最多「未來班次」的站點
                        let bestSeq = null;
                        let maxCount = 0;
                        for (const seq in seqGroups) {
                            // 去除重複的時間 (有時 API 會回傳兩個相同的分鐘數)
                            seqGroups[seq] = [...new Set(seqGroups[seq])].sort((a, b) => a - b);
                            if (seqGroups[seq].length > maxCount) {
                                maxCount = seqGroups[seq].length;
                                bestSeq = seq;
                            }
                        }

                        // 如果找到合適站點，取最近的 3 班車
                        if (bestSeq) {
                            displayMins = seqGroups[bestSeq].slice(0, 3);
                        }
                    }

                    // 更新 DOM
                    const container = document.getElementById(`bus-etas-${i}`);
                    if (displayMins.length === 0) {
                        container.innerHTML = `<span class="eta-min none">暫無班次</span>`;
                    } else {
                        container.innerHTML = displayMins.map(m => {
                            const colorClass = m <= 5 ? 'red' : '';
                            return `<span class="eta-min ${colorClass}">${m}</span>`;
                        }).join('');
                    }
                } catch (e) { 
                    console.error(`Bus API Error (${busRoutes[i].num}):`, e); 
                }
            }
        }
        // 初始載入及設定每 60 秒刷新
        fetchBusETA();
        setInterval(fetchBusETA, 60000);

        /* ==========================================
           F. 香港天文台實時及預報天氣
           ========================================== */
        function getWeatherIcon(iconId) {
            if(iconId >= 50 && iconId <= 54) return '☀️';
            if(iconId >= 60 && iconId <= 65) return '☁️';
            if(iconId >= 70 && iconId <= 77) return '🌧️';
            if(iconId >= 80) return '⛈️';
            return '⛅';
        }

        async function fetchWeather() {
            try {
                // 1. 實時天氣
                const curRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const curData = await curRes.json();
                const temp = curData.temperature.data.find(d => d.place === '沙田')?.value || curData.temperature.data[0].value;
                const hum = curData.humidity.data[0].value;
                document.getElementById('cw-temp-hum').innerText = `${temp}°C | ${hum}%`;
                
                // 2. 9天預報 (提取 6 天)
                const fndRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndData = await fndRes.json();
                const forecastRow = document.getElementById('forecast-row');
                forecastRow.innerHTML = '';
                
                fndData.weatherForecast.slice(0, 6).forEach(day => {
                    const dateStr = `${day.forecastDate.substring(4,6)}月${day.forecastDate.substring(6,8)}日`;
                    const isSun = day.week === '星期日';
                    const tempStr = `${day.forecastMintemp.value}|${day.forecastMaxtemp.value}°C`;
                    const humStr = `${day.forecastMinrh.value}-${day.forecastMaxrh.value}%`;
                    const rainStr = `降雨: ${day.PSR}`;
                    
                    forecastRow.innerHTML += `
                        <div class="forecast-day">
                            <div class="fd-date">${dateStr}</div>
                            <div class="fd-day ${isSun ? 'sun' : ''}">${day.week}</div>
                            <div class="fd-icon">${getWeatherIcon(day.ForecastIcon)}</div>
                            <div class="fd-temp">${tempStr}</div>
                            <div class="fd-hum">${humStr}</div>
                            <div class="fd-rain">${rainStr}</div>
                        </div>`;
                });
            } catch (e) { console.error("Weather API Error:", e); }
        }
        setInterval(fetchWeather, 5 * 60 * 1000);
        fetchWeather();
    </script>
</body>
</html>
