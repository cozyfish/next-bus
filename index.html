<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Multi-Dashboard</title>
    <style>
        /* ==========================================
           1. 完美自適應畫布系統
           ========================================== */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", sans-serif;
            position: relative;
        }

        #app-container {
            width: 1920px; height: 1080px;
            position: absolute;
            left: 0; top: 0;
            transform-origin: 0 0; 
            background-color: #0A2E8E;
            overflow: hidden;
        }

        .page {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            pointer-events: none;
        }
        .page.active { opacity: 1; pointer-events: auto; }

        /* ==========================================
           2. 頂部 Header & 播放控制鍵
           ========================================== */
        .header {
            height: 160px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 4px solid #1c3c9e; background-color: #0A2E8E;
        }
        .header-left { display: flex; flex-direction: column; justify-content: center; }
        .date-container { display: flex; align-items: baseline; gap: 25px; }
        .date-str { font-size: 65px; color: #88ccff; font-weight: bold; letter-spacing: 2px; line-height: 1.1; }
        
        .controls { display: flex; gap: 15px; align-items: center; }
        .ctrl-btn { width: 50px; height: 50px; cursor: pointer; fill: #88ccff; transition: transform 0.2s, fill 0.2s; }
        .ctrl-btn:active { transform: scale(0.9); }
        .ctrl-btn:hover { fill: #ffffff; }

        .lunar-str { font-size: 32px; color: #88ccff; margin-top: 5px; font-weight: bold; }
        .time-str { font-size: 130px; color: #88ccff; letter-spacing: 5px; margin-top: -10px; }

        /* ==========================================
           3. 頁面 1 (天氣與雙層 4 格狗相)
           ========================================== */
        .middle-row { height: 490px; display: flex; border-bottom: 4px solid #1c3c9e; }
        
        .dog-carousel-container {
            width: 1300px; position: relative; background: #1c3c9e;
            border-right: 4px solid #1c3c9e; box-sizing: border-box; overflow: hidden;
        }
        .dog-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 4px;
            box-sizing: border-box; transition: opacity 0.8s ease-in-out; 
        }
        .dog-slot { background: #0A2E8E; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .dog-img { width: 100%; height: 100%; object-fit: cover; }

        .weather-current { 
            width: 620px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; box-sizing: border-box; 
        }
        .weather-loc { font-size: 65px; color: #88ccff; margin-bottom: 15px; }
        .weather-temp { font-size: 60px; color: #fff; margin-bottom: 20px; font-weight: bold; }
        .weather-aqi { font-size: 40px; color: #aaa; line-height: 1.5; margin-bottom: 15px; }
        .weather-icon-huge { font-size: 120px; margin-top: 10px; }

        .forecast-row { 
            height: 430px; display: grid; grid-template-columns: repeat(6, 1fr); 
            gap: 4px; background: #1c3c9e; padding: 4px 0 0 0; 
        }
        .forecast-day { background: #0A2E8E; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .fd-date { font-size: 38px; font-weight: bold; color: #88ccff; }
        .fd-day { font-size: 34px; font-weight: bold; color: #88ccff; }
        .fd-day.sun { color: #ff5555; }
        .fd-icon { font-size: 70px; }
        .fd-temp { font-size: 42px; font-weight: bold; color: #fff; }
        .fd-hum { font-size: 32px; color: #88ccff; }
        .fd-rain { font-size: 30px; color: #88ccff; }

        /* ==========================================
           4. 頁面 2+ (巴士與交通共用樣式)
           ========================================== */
        .bus-grid { 
            height: 920px; display: grid; grid-template-columns: 660px 660px 584px; 
            gap: 8px; background: #1c3c9e; padding: 8px; box-sizing: border-box; 
        }
        .bus-col { display: grid; grid-template-rows: repeat(4, 1fr); gap: 8px; }
        .bus-cell { background: #0A2E8E; display: flex; flex-direction: column; justify-content: center; padding: 0 40px; }
        
        .bus-route-row { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid rgba(255,255,255,0.15); padding-bottom: 10px; }
        .bus-num { font-size: 65px; color: #ffffaa; font-weight: bold; white-space: nowrap; }
        .bus-dest-container { display: flex; align-items: center; justify-content: flex-end; width: 100%; margin-left: 20px;}
        .bus-dest { font-size: 40px; color: #ffffff; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
        
        .refresh-btn { 
            cursor: pointer; margin-left: 15px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease; user-select: none;
        }
        .refresh-btn:active svg { transform: rotate(180deg); }

        .bus-eta-row { display: flex; gap: 30px; margin-top: 25px; font-weight: bold; font-size: 60px; }
        .eta-time { color: #55ff55; } 
        .eta-time.none { color: #888; font-size: 42px; font-weight: normal; }

        .traffic-col { background: #002277; padding: 40px; display: flex; flex-direction: column; justify-content: center; gap: 40px; }
        .traffic-header { font-size: 45px; color: #88ccff; border-bottom: 2px solid #88ccff; padding-bottom: 15px; margin-bottom: 10px; text-align: center; }
        .traffic-row { display: flex; justify-content: space-between; font-size: 50px; color: #fff; align-items: center; }
        .traffic-time { color: #55ff55; font-weight: bold; }
        .traffic-time span { font-size: 35px; color: #aaa; margin-left: 10px; font-weight: normal; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="page1" class="page active">
            <div id="header-container-1"></div>
            <div class="middle-row">
                <div class="dog-carousel-container">
                    <div class="dog-layer" id="dog-layer-1" style="opacity: 1; z-index: 2;">
                        <div class="dog-slot"><img id="l1-img-0" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l1-img-1" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l1-img-2" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l1-img-3" class="dog-img" src=""></div>
                    </div>
                    <div class="dog-layer" id="dog-layer-2" style="opacity: 0; z-index: 1;">
                        <div class="dog-slot"><img id="l2-img-0" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l2-img-1" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l2-img-2" class="dog-img" src=""></div>
                        <div class="dog-slot"><img id="l2-img-3" class="dog-img" src=""></div>
                    </div>
                </div>
                <div class="weather-current">
                    <div class="weather-loc">沙田</div>
                    <div class="weather-temp" id="cw-temp-hum">--°C | --%</div>
                    <div class="weather-aqi">CO2: 448<br>PM2.5: 26</div> 
                    <div class="weather-icon-huge" id="cw-icon">⛅</div>
                </div>
            </div>
            <div class="forecast-row" id="forecast-row"></div>
        </div>
        </div>

    <script>
        /* ==========================================
           1. 總路線設定庫 (全面硬綁定 Stop ID，零自動尋站風險)
           ========================================== */
        // 以下是沙田圍/博康/沙角一帶的真實 UUID 示範，請根據你的實際站柱進行替換。
        const STOP_POK_HONG = '95A40CC74EC5355A';
        const STOP_SHA_KOK  = '8BB8699CE9B1F2A7';
        const STOP_ST_WAI   = 'C94BE5CBE0E2A123';

        const busRoutes = [
            { num: '47X', currentDir: 0, dirs: [{ dest: '葵盛(東)', kmbStopId: STOP_ST_WAI }, { dest: '秦石', kmbStopId: STOP_POK_HONG }] },
            { num: '80X', currentDir: 0, dirs: [{ dest: '觀塘碼頭', kmbStopId: STOP_POK_HONG }, { dest: '秦石', kmbStopId: STOP_POK_HONG }] },
            { num: '287X', currentDir: 0, dirs: [{ dest: '旺角(循環)', kmbStopId: STOP_POK_HONG }, { dest: '水泉澳', kmbStopId: STOP_POK_HONG }] },
            
            // 聯營線 170 (九巴 + 城巴 ID 雙軌運行)
            { num: '170', currentDir: 0, dirs: [
                { dest: '華富(中)', kmbStopId: STOP_POK_HONG, ctbStopId: '002626' }, 
                { dest: '沙田站', kmbStopId: STOP_SHA_KOK, ctbStopId: '002657' }
            ]},
            
            // 龍運線 E42, A42
            { num: 'E42', currentDir: 0, dirs: [{ dest: '機場', kmbStopId: STOP_POK_HONG}, { dest: '博康', kmbStopId: STOP_SHA_KOK}] },
            { num: '86A', currentDir: 0, dirs: [{ dest: '長沙灣', kmbStopId: STOP_SHA_KOK}, { dest: '沙田圍', kmbStopId: STOP_ST_WAI}] },
            { num: '85A', currentDir: 0, dirs: [{ dest: '九龍城碼頭', kmbStopId: STOP_ST_WAI}, { dest: '廣源', kmbStopId: STOP_ST_WAI}] },
            { num: '249X', currentDir: 0, dirs: [{ dest: '青衣站', kmbStopId: STOP_POK_HONG}, { dest: '博康', kmbStopId: STOP_SHA_KOK}] },
            { num: '81K', currentDir: 0, dirs: [{ dest: '新田圍', kmbStopId: STOP_SHA_KOK}, { dest: '穗禾苑', kmbStopId: STOP_ST_WAI}] },
            { num: '82K', currentDir: 0, dirs: [{ dest: '美林', kmbStopId: STOP_POK_HONG}, { dest: '黃泥頭', kmbStopId: STOP_SHA_KOK}] },
            { num: '89B', currentDir: 0, dirs: [{ dest: '觀塘', kmbStopId: STOP_SHA_KOK}, { dest: '沙田圍', kmbStopId: STOP_ST_WAI}] },
            
            // 聯營線 182
            { num: '182', currentDir: 0, dirs: [
                { dest: '中環(港澳碼頭)', kmbStopId: STOP_POK_HONG, ctbStopId: '002626'}, 
                { dest: '愉翠苑', kmbStopId: STOP_SHA_KOK, ctbStopId: '002657'}
            ]},
            { num: 'A42', currentDir: 0, dirs: [{ dest: '機場', kmbStopId: STOP_POK_HONG}, { dest: '黃泥頭', kmbStopId: STOP_SHA_KOK}] }
        ];

        /* ==========================================
           2. 動態生成網頁及 Header 控制器
           ========================================== */
        const refreshSvgIcon = `<svg viewBox="0 0 24 24" width="38" height="38" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>`;
        
        const svgPrev = `<svg viewBox="0 0 24 24" class="ctrl-btn" onclick="prevPage()"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>`;
        const svgNext = `<svg viewBox="0 0 24 24" class="ctrl-btn" onclick="nextPage()"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>`;
        
        function getHeaderHtml() {
            return `
                <div class="header">
                    <div class="header-left">
                        <div class="date-container">
                            <div class="date-str date-str-sync">----年--月--日(-)</div>
                            <div class="controls">
                                ${svgPrev}
                                <svg viewBox="0 0 24 24" class="ctrl-btn" onclick="togglePlay()">
                                    <path class="play-pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                                </svg>
                                ${svgNext}
                            </div>
                        </div>
                        <div class="lunar-str lunar-str-sync">載入農曆中...</div>
                    </div>
                    <div class="header-right"><div class="time-str time-str-sync">--:--:--</div></div>
                </div>`;
        }
        
        document.getElementById('header-container-1').innerHTML = getHeaderHtml();

        const tunnelHtml = `
            <div class="traffic-header">沙田區 隧道預計時間</div>
            <div class="traffic-row"><span>獅子山隧道</span><span class="traffic-time tunnel-lion-sync">--<span>分鐘</span></span></div>
            <div class="traffic-row"><span>大老山隧道</span><span class="traffic-time tunnel-tates-sync">--<span>分鐘</span></span></div>
            <div class="traffic-row"><span>城門隧道</span><span class="traffic-time tunnel-shingmun-sync">--<span>分鐘</span></span></div>
            <div class="traffic-row"><span>尖山隧道</span><span class="traffic-time tunnel-eagle-sync">--<span>分鐘</span></span></div>
        `;

        for (let i = 0; i < busRoutes.length; i += 8) {
            const chunk = busRoutes.slice(i, i + 8);
            let col1Html = '', col2Html = '';

            chunk.forEach((r, localIdx) => {
                const globalIdx = i + localIdx;
                const cellHtml = `
                    <div class="bus-cell">
                        <div class="bus-route-row">
                            <span class="bus-num">${r.num}</span>
                            <div class="bus-dest-container">
                                <span class="bus-dest" id="bus-dest-text-${globalIdx}">${r.dirs[r.currentDir].dest}</span>
                                <div class="refresh-btn" onclick="toggleDirection(${globalIdx})" title="切換方向">${refreshSvgIcon}</div>
                            </div>
                        </div>
                        <div class="bus-eta-row" id="bus-etas-${globalIdx}"><span class="eta-time none">載入中...</span></div>
                    </div>`;
                if (localIdx < 4) col1Html += cellHtml;
                else col2Html += cellHtml;
            });

            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.innerHTML = `
                ${getHeaderHtml()}
                <div class="bus-grid">
                    <div class="bus-col">${col1Html}</div>
                    <div class="bus-col">${col2Html}</div>
                    <div class="traffic-col">${tunnelHtml}</div>
                </div>
            `;
            document.getElementById('app-container').appendChild(pageDiv);
        }

        /* ==========================================
           3. 播放器輪播控制器
           ========================================== */
        const allPages = document.querySelectorAll('.page');
        let currentPageIdx = 0;
        let isPlaying = true;
        let pageTimer;

        function showPage(idx) {
            allPages.forEach(p => p.classList.remove('active'));
            allPages[idx].classList.add('active');
        }

        function nextPage() {
            currentPageIdx = (currentPageIdx + 1) % allPages.length;
            showPage(currentPageIdx);
            if (isPlaying) resetTimer(); 
        }

        function prevPage() {
            currentPageIdx = (currentPageIdx - 1 + allPages.length) % allPages.length;
            showPage(currentPageIdx);
            if (isPlaying) resetTimer();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const pathData = isPlaying ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z"; 
            document.querySelectorAll('.play-pause-path').forEach(p => p.setAttribute('d', pathData));
            if (isPlaying) resetTimer();
            else clearInterval(pageTimer);
        }

        function resetTimer() {
            clearInterval(pageTimer);
            pageTimer = setInterval(nextPage, 15000); 
        }
        resetTimer(); 

        /* ==========================================
           4. 自適應縮放
           ========================================== */
        function resizeCanvas() {
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const scale = Math.min(ww / 1920, wh / 1080);
            const left = (ww - (1920 * scale)) / 2;
            const top = (wh - (1080 * scale)) / 2;
            document.getElementById('app-container').style.transform = `translate(${left}px, ${top}px) scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        /* ==========================================
           5. 時鐘與農曆引擎
           ========================================== */
        function getPerfectLunarDateStr(date) {
            try {
                const formatter = new Intl.DateTimeFormat('zh-HK-u-ca-chinese', { dateStyle: 'full' });
                let rawStr = formatter.format(date); 
                let stemBranch = "丙午"; 
                const sbMatch = rawStr.match(/(\w{2})年/);
                if (sbMatch) stemBranch = sbMatch[1];

                const zodiacMap = {'子':'鼠','丑':'牛','寅':'虎','卯':'兔','辰':'龍','巳':'蛇','午':'馬','未':'羊','申':'猴','酉':'雞','戌':'狗','亥':'豬'};
                const zodiac = zodiacMap[stemBranch.charAt(1)] || "馬";

                let monthDayStr = "五月十五";
                const mdMatch = rawStr.match(/年(.+?)日/);
                if (mdMatch) {
                    monthDayStr = mdMatch[1].replace('M01', '正月').replace('M02', '二月').replace('M03', '三月').replace('M04', '四月')
                        .replace('M05', '五月').replace('M06', '六月').replace('M07', '七月').replace('M08', '八月')
                        .replace('M09', '九月').replace('M10', '十月').replace('M11', '十一月').replace('M12', '十二月');
                    const dayCh = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
                    monthDayStr = monthDayStr.replace(/ (\d{1,2})/, (m, p1) => dayCh[parseInt(p1)] || m);
                }
                return `農曆 ${stemBranch} ${zodiac}年 ${monthDayStr}`;
            } catch(e) { return "農曆 丙午 馬年 五月十五"; }
        }

        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            
            const timeStr = `${hh}:${mm}:${ss}`;
            const dateStr = `${year}年${month}月${date}日(${weekdays[now.getDay()]})`;
            const lunarStr = getPerfectLunarDateStr(now);

            document.querySelectorAll('.time-str-sync').forEach(el => el.innerText = timeStr);
            document.querySelectorAll('.date-str-sync').forEach(el => el.innerText = dateStr);
            document.querySelectorAll('.lunar-str-sync').forEach(el => el.innerText = lunarStr);
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ==========================================
           6. 狗狗相片 3 秒無縫輪播
           ========================================== */
        const dogUrls = [
            "https://images.dog.ceo/breeds/retriever-golden/n02099601_3004.jpg", "https://images.dog.ceo/breeds/husky/n02110185_10047.jpg",
            "https://images.dog.ceo/breeds/shiba/shiba-13.jpg", "https://images.dog.ceo/breeds/samoyed/n02111889_110.jpg",
            "https://images.dog.ceo/breeds/corgi-cardigan/n02113186_1111.jpg", "https://images.dog.ceo/breeds/pug/n02110958_13038.jpg",
            "https://images.dog.ceo/breeds/beagle/n02088364_12115.jpg", "https://images.dog.ceo/breeds/pomeranian/n02112018_1090.jpg",
            "https://images.dog.ceo/breeds/dalmatian/cooper1.jpg", "https://images.dog.ceo/breeds/retriever-labrador/n02099712_7411.jpg"
        ];
        let activeDogLayer = 1;
        function get4RandomDogs() {
            let selected = [];
            while(selected.length < 4) {
                let url = dogUrls[Math.floor(Math.random() * dogUrls.length)];
                if(!selected.includes(url)) selected.push(url);
            }
            return selected;
        }
        const initialDogs = get4RandomDogs();
        for(let i=0; i<4; i++) document.getElementById(`l1-img-${i}`).src = initialDogs[i];

        setInterval(() => {
            const nextLayer = activeDogLayer === 1 ? 2 : 1;
            const newDogs = get4RandomDogs();
            let loadedCount = 0;
            for(let i=0; i<4; i++) {
                const imgEl = document.getElementById(`l${nextLayer}-img-${i}`);
                imgEl.onload = () => {
                    loadedCount++;
                    if(loadedCount === 4) {
                        document.getElementById(`dog-layer-${nextLayer}`).style.opacity = 1;
                        document.getElementById(`dog-layer-${nextLayer}`).style.zIndex = 2;
                        document.getElementById(`dog-layer-${activeDogLayer}`).style.opacity = 0;
                        document.getElementById(`dog-layer-${activeDogLayer}`).style.zIndex = 1;
                        activeDogLayer = nextLayer;
                    }
                };
                imgEl.src = newDogs[i];
            }
        }, 3000); 

        /* ==========================================
           7. 巴士 ETA (完美九巴/城巴/龍運無縫融合引擎，移除 dir 過濾)
           ========================================== */
        async function fetchSpecificRoute(idx) {
            const r = busRoutes[idx];
            const activeDir = r.dirs[r.currentDir];
            const now = new Date();
            let rawDates = [];

            try {
                const fetchPromises = [];

                // 1. 九巴 / 龍運 (KMB / LWB) 數據抓取
                if (activeDir.kmbStopId) {
                    // 智能判斷：若路線以 E, A 開頭，自動轉用 lwb 獨立通道
                    const companyId = (r.num.match(/^[EA]/)) ? 'lwb' : 'kmb';
                    
                    fetchPromises.push(
                        fetch(`https://data.etabus.gov.hk/v1/transport/${companyId}/stop-eta/${activeDir.kmbStopId}`)
                            .then(res => res.json())
                            .then(json => {
                                if (json.data && json.data.length > 0) {
                                    // 核心修正：移除 item.dir 過濾，只要實體站柱吻合，就是你要的班次！
                                    json.data
                                        .filter(item => item.route === r.num && item.eta !== null)
                                        .forEach(item => {
                                            const exactEtaDate = new Date(item.eta);
                                            if (exactEtaDate >= new Date(now.getTime() - 60000)) rawDates.push(exactEtaDate);
                                        });
                                }
                            }).catch(e => console.error(`${companyId} API Error (${r.num}):`, e))
                    );
                }

                // 2. 城巴 (CTB) 數據抓取 (專治 170, 182 聯營路線)
                if (activeDir.ctbStopId) {
                    fetchPromises.push(
                        // 修正：必須使用 v1 版本的 URL
                        fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${activeDir.ctbStopId}/${r.num}`)
                            .then(res => res.json())
                            .then(ctbJson => {
                                if (ctbJson.data && ctbJson.data.length > 0) {
                                    // 核心修正：同樣移除 dir 過濾
                                    ctbJson.data
                                        .filter(item => item.eta !== null && item.eta !== "")
                                        .forEach(item => {
                                            const exactEtaDate = new Date(item.eta);
                                            if (exactEtaDate >= new Date(now.getTime() - 60000)) rawDates.push(exactEtaDate);
                                        });
                                }
                            }).catch(e => console.error(`CTB API Error (${r.num}):`, e))
                    );
                }

                // 並行等待所有 API 請求完成，做到無縫融合
                await Promise.all(fetchPromises);

                // 3. 合併、排序與渲染
                rawDates.sort((a, b) => a.getTime() - b.getTime());
                let formattedTimes = rawDates.map(date => `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`);
                formattedTimes = [...new Set(formattedTimes)].slice(0, 3);

                const container = document.getElementById(`bus-etas-${idx}`);
                if (formattedTimes.length === 0) {
                    container.innerHTML = `<span class="eta-time none">暫無班次 / 過鐘</span>`;
                } else {
                    container.innerHTML = formattedTimes.map(t => `<span class="eta-time">${t}</span>`).join('');
                }

            } catch (e) { 
                document.getElementById(`bus-etas-${idx}`).innerHTML = `<span class="eta-time none">載入失敗</span>`;
            }
        }

        function toggleDirection(idx) {
            const r = busRoutes[idx];
            r.currentDir = (r.currentDir + 1) % r.dirs.length;
            document.getElementById(`bus-dest-text-${idx}`).innerText = r.dirs[r.currentDir].dest;
            document.getElementById(`bus-etas-${idx}`).innerHTML = '<span class="eta-time none">載入中...</span>';
            fetchSpecificRoute(idx);
        }

        async function fetchAllBuses() {
            for (let i = 0; i < busRoutes.length; i++) {
                await fetchSpecificRoute(i);
                // 排隊 Fetch，防止高頻請求被政府 API 封鎖
                await new Promise(resolve => setTimeout(resolve, 200)); 
            }
        }
        
        // 初始運行
        fetchAllBuses();
        setInterval(fetchAllBuses, 60000);

        /* ==========================================
           8. 天氣與隧道資訊
           ========================================== */
        async function fetchWeather() {
            try {
                const curRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const curData = await curRes.json();
                const temp = curData.temperature.data.find(d => d.place === '沙田')?.value || curData.temperature.data[0].value;
                const hum = curData.humidity.data[0].value;
                document.getElementById('cw-temp-hum').innerText = `${temp}°C | ${hum}%`;
                
                const fndRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndData = await fndRes.json();
                let forecastHtml = '';
                fndData.weatherForecast.slice(0, 6).forEach(day => {
                    const dateStr = `${day.forecastDate.substring(4,6)}月${day.forecastDate.substring(6,8)}日`;
                    const icon = (day.ForecastIcon >= 50 && day.ForecastIcon <= 54) ? '☀️' : (day.ForecastIcon >= 80 ? '⛈️' : (day.ForecastIcon >= 70 ? '🌧️' : '⛅'));
                    forecastHtml += `
                        <div class="forecast-day">
                            <div class="fd-date">${dateStr}</div>
                            <div class="fd-day ${day.week === '星期日' ? 'sun' : ''}">${day.week}</div>
                            <div class="fd-icon">${icon}</div>
                            <div class="fd-temp">${day.forecastMintemp.value}|${day.forecastMaxtemp.value}°C</div>
                            <div class="fd-hum">${day.forecastMinrh.value}-${day.forecastMaxrh.value}%</div>
                            <div class="fd-rain">降雨: ${day.PSR}</div>
                        </div>`;
                });
                document.getElementById('forecast-row').innerHTML = forecastHtml;
            } catch (e) { console.error(e); }
        }
        fetchWeather(); setInterval(fetchWeather, 300000);

        async function fetchTunnelTime(startLat, startLng, endLat, endLng, classSelector) {
            try {
                const response = await fetch('https://tdas-api.hkemobility.gov.hk/tdas/api/route', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start: { lat: startLat, long: startLng }, end: { lat: endLat, long: endLng }, departIn: 0, lang: "tc", type: "ST" })
                });
                const data = await response.json();
                if (data && data.eta) {
                    const mins = parseInt(data.eta.split(':')[0], 10) * 60 + parseInt(data.eta.split(':')[1], 10);
                    document.querySelectorAll(classSelector).forEach(el => el.innerHTML = `${mins}<span>分鐘</span>`);
                }
            } catch (e) { document.querySelectorAll(classSelector).forEach(el => el.innerHTML = `--<span>分鐘</span>`); }
        }

        async function fetchAllTunnels() {
            await fetchTunnelTime(22.3687, 114.1866, 22.3396, 114.1764, '.tunnel-lion-sync');
            await new Promise(r => setTimeout(r, 300));
            await fetchTunnelTime(22.3820, 114.2045, 22.3364, 114.2057, '.tunnel-tates-sync');
            await new Promise(r => setTimeout(r, 300));
            await fetchTunnelTime(22.3807, 114.1751, 22.3784, 114.1311, '.tunnel-shingmun-sync');
            await new Promise(r => setTimeout(r, 300));
            await fetchTunnelTime(22.3698, 114.1670, 22.3360, 114.1481, '.tunnel-eagle-sync');
        }
        fetchAllTunnels(); setInterval(fetchAllTunnels, 180000);
    </script>
